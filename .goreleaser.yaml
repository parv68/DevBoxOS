version: 2

project_name: devbox

before:
  hooks:
    - go mod tidy -C shared
    - go mod tidy -C engine
    - go mod tidy -C cli

builds:
  - id: cli
    dir: cli
    binary: devbox
    main: .
    ldflags:
      - -s -w
      - -X github.com/devboxos/devboxos/cli/cmd.version={{.Version}}
      - -X github.com/devboxos/devboxos/cli/cmd.commit={{.Commit}}
      - -X github.com/devboxos/devboxos/cli/cmd.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  - id: engine
    dir: engine/cmd
    binary: devbox-engine
    main: .
    ldflags:
      - -s -w
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: combined
    builds:
      - cli
      - engine
    name_template: "devbox_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: parv68
    name: DevBoxOS
  prerelease: auto
  name_template: "DevBoxOS v{{ .Version }}"
