name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: ["1.22"]
        include:
          - os: ubuntu-latest
            go-version: "1.23"
          - os: ubuntu-latest
            go-version: "1.24"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true

      - name: Build shared
        run: go build ./shared/...

      - name: Build engine
        run: go build ./engine/...

      - name: Build CLI
        run: go build ./cli/...

      - name: Vet
        run: go vet ./shared/... ./engine/... ./cli/...

      - name: Unit tests
        run: go test -count=1 ./shared/... ./engine/... ./cli/... -timeout 180s

  integration:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: Integration tests
        run: go test -tags=integration -count=1 -short ./shared/... -timeout 300s
        env:
          DOCKER_TEST_PULL: "1"

  e2e:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: Build CLI + engine
        run: |
          go build -o cli/devboxos ./cli
          go build -o engine/devbox-engine ./engine/cmd

      - name: Start engine daemon
        run: |
          ./engine/devbox-engine &
          sleep 3

      - name: E2E smoke tests
        run: go test -tags=e2e -count=1 -short ./tests/... -timeout 300s -v

  bench:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: Build CLI + engine
        run: |
          go build -o cli/devboxos ./cli
          go build -o engine/devbox-engine ./engine/cmd

      - name: Start engine daemon
        run: |
          ./engine/devbox-engine &
          sleep 3

      - name: Run benchmarks
        run: go test -tags=e2e -bench=. -benchtime=1x ./tests/... -run=^$ -timeout 600s -v 2>&1 | tee bench-results.txt

      - uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench-results.txt

  security:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: Build CLI + engine
        run: |
          go build -o cli/devboxos ./cli
          go build -o engine/devbox-engine ./engine/cmd

      - name: Start engine daemon
        run: |
          ./engine/devbox-engine &
          sleep 3

      - name: Security tests
        run: go test -tags=e2e -count=1 -short ./tests/... -run TestSecurity -timeout 300s -v
