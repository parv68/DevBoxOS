name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: Build shared
        run: go build ./shared/...

      - name: Build engine
        run: go build ./engine/...

      - name: Build CLI
        run: go build ./cli/...

      - name: Vet
        run: go vet ./shared/... ./engine/... ./cli/...

      - name: Unit tests
        run: go test -count=1 ./shared/... ./engine/... ./cli/... -timeout 180s

  integration:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: Integration tests
        run: go test -tags=integration -count=1 ./shared/... -timeout 300s
        env:
          DOCKER_TEST_PULL: "1"
